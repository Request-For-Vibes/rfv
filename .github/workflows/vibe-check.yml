name: Vibe Check

on:
  pull_request:
    paths:
      - 'rfv-*.md'
      - 'submissions/rfv-*.md'

permissions:
  pull-requests: write
  contents: read

jobs:
  vibe-check:
    name: Assessing vibes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect RFV documents
        id: detect
        run: |
          FILES=$(git diff --name-only --diff-filter=AM origin/${{ github.base_ref }}...HEAD -- 'rfv-*.md' 'submissions/rfv-*.md')
          if [ -z "$FILES" ]; then
            echo "No RFV documents found in this PR."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$FILES" > /tmp/rfv-files.txt
            echo "RFV documents detected:"
            cat /tmp/rfv-files.txt
          fi

      - name: Check the vibes
        if: steps.detect.outputs.found == 'true'
        id: vibes
        run: |
          chmod +x .github/scripts/vibe-check.sh
          .github/scripts/vibe-check.sh /tmp/rfv-files.txt > /tmp/vibe-report.md
          echo "report<<VIBES_EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/vibe-report.md >> "$GITHUB_OUTPUT"
          echo "VIBES_EOF" >> "$GITHUB_OUTPUT"

          if grep -q "VIBE STATUS: CATASTROPHIC" /tmp/vibe-report.md; then
            echo "result=failure" >> "$GITHUB_OUTPUT"
          elif grep -q "VIBE STATUS: OFF" /tmp/vibe-report.md; then
            echo "result=warning" >> "$GITHUB_OUTPUT"
          else
            echo "result=pass" >> "$GITHUB_OUTPUT"
          fi

      - name: Post vibe report
        if: steps.detect.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.vibes.outputs.report }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });

      - name: Fail on catastrophic vibes
        if: steps.vibes.outputs.result == 'failure'
        run: |
          echo "::error::The vibes are catastrophic. See the PR comment for details."
          exit 1
